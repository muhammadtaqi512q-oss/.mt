<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexura Profiles</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#ffffff;
    padding:25px;
}

.logo{
    text-align:center;
    font-size:85px;
    font-weight:900;
    color:#004a7c;
    margin-bottom:30px;
    letter-spacing:-4px;
}

.search-box{
    max-width:700px;
    margin:auto;
    position:relative;
}

.search-box input{
    width:100%;
    height:60px;
    border-radius:50px;
    border:3px solid #004a7c;
    padding-left:60px;
    padding-right:20px;
    font-size:18px;
    outline:none;
}

.search-icon{
    position:absolute;
    left:20px;
    top:16px;
    font-size:24px;
    color:#004a7c;
}

#status{
    text-align:center;
    margin-top:18px;
    color:#666;
    font-size:16px;
}

#results{
    max-width:700px;
    margin:30px auto;
}

.card{
    background:#f5faff;
    border:1px solid #dbe8ff;
    border-radius:25px;
    padding:22px;
    margin-bottom:18px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 6px 15px rgba(0,0,0,0.05);
}

.card:hover{
    transform:translateY(-4px);
    background:#edf6ff;
}

.card h2{
    color:#004a7c;
    font-size:30px;
    margin-bottom:10px;
}

.card p{
    font-size:17px;
    color:#333;
    line-height:1.8;
}

.details{
    display:none;
    margin-top:15px;
    border-top:1px solid #cfe0ff;
    padding-top:15px;
}

.show{
    display:block;
}

</style>
</head>

<body>

<div class="logo">
    Nexura
</div>

<div class="search-box">

    <div class="search-icon">
        🔍
    </div>

    <input 
        type="text"
        id="searchInput"
        placeholder="Search profiles..."
    >

</div>

<div id="status">
    Loading Profiles...
</div>

<div id="results"></div>

<script>

const profileUrl =
"https://muhammadtaqi512q-oss.github.io/.mt/PROFILE";

const results =
document.getElementById("results");

const searchInput =
document.getElementById("searchInput");

const status =
document.getElementById("status");

let profiles = [];

async function fetchProfiles(){

    try{

        const response =
        await fetch(profileUrl);

        const html =
        await response.text();

        const doc =
        new DOMParser()
        .parseFromString(html,"text/html");

        let texts = [];

        // FETCH ALL PARAGRAPHS
        doc.querySelectorAll("p").forEach(el=>{

            const text =
            el.innerText.trim();

            if(text.length > 5){

                texts.push(text);

            }

        });

        // REMOVE DUPLICATES
        texts = [...new Set(texts)];

        profiles = [];

        texts.forEach(text=>{

            const splitProfiles =
            text.split("NAME ")
            .filter(Boolean);

            splitProfiles.forEach(profile=>{

                profiles.push({

                    details:
                    "NAME " +
                    profile.trim()

                });

            });

        });

        status.innerHTML =
        `Loaded ${profiles.length} Profiles`;

        displayProfiles(profiles);

    }

    catch(error){

        console.log(error);

        status.innerHTML =
        "Failed To Load Profiles";

    }

}

// EXTRACT TEXT
function extractValue(text,key){

    const regex =
    new RegExp(
        key + "\\s+(.*?)(?=NAME|WORK|AGE|EXPERIENCE|$)",
        "i"
    );

    const match =
    text.match(regex);

    return match
    ? match[1].trim()
    : "Not Found";

}

// SHOW PROFILES
function displayProfiles(data){

    results.innerHTML = "";

    data.forEach(profile=>{

        const name =
        extractValue(
            profile.details,
            "NAME"
        );

        const work =
        extractValue(
            profile.details,
            "WORK"
        );

        const age =
        extractValue(
            profile.details,
            "AGE"
        );

        const experience =
        extractValue(
            profile.details,
            "EXPERIENCE"
        );

        const card =
        document.createElement("div");

        card.className =
        "card";

        card.innerHTML = `

            <!-- ALWAYS SHOW -->

            <h2>
                NAME ${name}
            </h2>

            <p>
                WORK ${work}
            </p>

            <!-- HIDDEN DETAILS -->

            <div class="details">

                <p>
                    AGE ${age}
                </p>

                <p>
                    EXPERIENCE ${experience}
                </p>

            </div>

        `;

        // CLICK TO OPEN DETAILS
        card.addEventListener("click",()=>{

            const details =
            card.querySelector(".details");

            details.classList.toggle("show");

        });

        results.appendChild(card);

    });

}

// SEARCH
searchInput.addEventListener("input",()=>{

    const value =
    searchInput.value
    .toLowerCase()
    .trim();

    const filtered =
    profiles.filter(profile=>{

        return profile.details
        .toLowerCase()
        .includes(value);

    });

    displayProfiles(filtered);

});

// START
fetchProfiles();

</script>

</body>
</html>
