<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexura Profiles</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#ffffff;
    min-height:100vh;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* TOP NAV */

.top-nav{
    width:100%;
    display:flex;
    justify-content:flex-end;
    margin-bottom:20px;
}

.profile-icon{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#004a7c;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
}

/* MAIN */

.main-container{
    width:100%;
    max-width:700px;
}

.logo{
    text-align:center;
    font-size:90px;
    font-weight:900;
    color:#004a7c;
    margin-bottom:30px;
    letter-spacing:-4px;
}

/* SEARCH */

.search-wrapper{
    position:relative;
    width:100%;
}

.search-main{
    width:100%;
    height:55px;
    border-radius:50px;
    border:2px solid #004a7c;
    padding-left:60px;
    padding-right:20px;
    font-size:18px;
    outline:none;
    transition:0.3s;
}

.search-main:focus{
    box-shadow:0 0 12px #004a7c55;
}

.search-icon{
    position:absolute;
    left:20px;
    top:14px;
    font-size:22px;
    color:#004a7c;
}

/* STATUS */

#engine-status{
    text-align:center;
    margin-top:15px;
    color:#666;
    font-size:15px;
}

/* RESULTS */

#results-container{
    margin-top:25px;
    width:100%;
}

/* CARD */

.result-card{
    background:#f7fbff;
    border:1px solid #d7e7ff;
    border-radius:20px;
    padding:20px;
    margin-bottom:18px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.result-card:hover{
    background:#edf6ff;
    transform:translateY(-3px);
}

.res-title{
    font-size:26px;
    font-weight:700;
    color:#004a7c;
    margin-bottom:10px;
}

.res-work{
    font-size:17px;
    color:#333;
    line-height:1.7;
}

/* DETAILS */

.profile-details{
    display:none;
    margin-top:18px;
    border-top:1px solid #d7e7ff;
    padding-top:15px;
}

.profile-details p{
    margin-bottom:10px;
    color:#444;
    line-height:1.7;
    font-size:16px;
}

.show{
    display:block;
}

/* BUTTON */

.share-btn{
    margin-top:15px;
    width:100%;
    height:48px;
    border:none;
    border-radius:40px;
    background:#004a7c;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.share-btn:hover{
    background:#00345a;
}

</style>
</head>

<body>

<div class="top-nav">

    <div class="profile-icon" title="Show All Profiles">
        T
    </div>

</div>

<div class="main-container">

    <div class="logo">
        Nexura
    </div>

    <div class="search-wrapper">

        <div class="search-icon">
            🔍
        </div>

        <input
            type="text"
            id="search-input"
            class="search-main"
            placeholder="Enter user name here..."
        >

    </div>

    <div id="engine-status">
        Loading Nexura Profiles...
    </div>

    <div id="results-container"></div>

</div>

<script>

// PROFILE FILE URL
const profileUrl =
"https://muhammadtaqi512q-oss.github.io/.mt/PROFILE";

// ELEMENTS
const input =
document.getElementById("search-input");

const resultsContainer =
document.getElementById("results-container");

const engineStatus =
document.getElementById("engine-status");

const profileIcon =
document.querySelector(".profile-icon");

// STORAGE
let profileData = [];

// FETCH PROFILES
async function fetchProfiles(){

    try{

        const response =
        await fetch(profileUrl);

        const html =
        await response.text();

        const doc =
        new DOMParser()
        .parseFromString(html,"text/html");

        let allTexts = [];

        // FETCH ALL P TAGS
        doc.querySelectorAll("p").forEach(el=>{

            const txt =
            el.innerText.trim();

            if(txt.length > 5){

                allTexts.push(txt);

            }

        });

        // REMOVE DUPLICATES
        allTexts =
        [...new Set(allTexts)];

        profileData = [];

        // SPLIT MULTIPLE PROFILES
        allTexts.forEach(text=>{

            const rawProfiles =
            text.split("NAME ")
            .filter(Boolean);

            rawProfiles.forEach(profile=>{

                profileData.push({

                    fullInfo:
                    "NAME " +
                    profile.trim()

                });

            });

        });

        engineStatus.innerText =
        `Loaded ${profileData.length} Profiles`;

        displayResults(profileData);

        // OPEN PROFILE FROM URL
        openProfileFromHash();

    }

    catch(error){

        console.log(error);

        engineStatus.innerText =
        "Failed To Load Profiles";

        engineStatus.style.color =
        "red";

    }

}

// EXTRACT TEXT
function extractValue(text,key){

    const regex =
    new RegExp(
        key + "\\s+(.*?)(?=NAME|WORK|AGE|EXPERIENCE|$)",
        "i"
    );

    const match =
    text.match(regex);

    return match
    ? match[1].trim()
    : "Not Found";

}

// DISPLAY RESULTS
function displayResults(matches){

    resultsContainer.innerHTML = "";

    matches.forEach(user=>{

        const name =
        extractValue(
            user.fullInfo,
            "NAME"
        );

        const work =
        extractValue(
            user.fullInfo,
            "WORK"
        );

        const age =
        extractValue(
            user.fullInfo,
            "AGE"
        );

        const experience =
        extractValue(
            user.fullInfo,
            "EXPERIENCE"
        );

        const card =
        document.createElement("div");

        card.className =
        "result-card";

        card.innerHTML = `

            <div class="res-title">
                NAME ${name}
            </div>

            <div class="res-work">
                WORK ${work}
            </div>

            <div class="profile-details">

                <p>
                    AGE ${age}
                </p>

                <p>
                    EXPERIENCE ${experience}
                </p>

            </div>

            <button class="share-btn">
                Share Profile
            </button>

        `;

        // OPEN DETAILS
        card.addEventListener("click",(e)=>{

            if(
                e.target.classList
                .contains("share-btn")
            ){
                return;
            }

            const details =
            card.querySelector(
                ".profile-details"
            );

            details.classList
            .toggle("show");

        });

        // SHARE BUTTON
        const shareBtn =
        card.querySelector(".share-btn");

        shareBtn.addEventListener("click",()=>{

            const shareURL =

            window.location.origin +

            window.location.pathname +

            "#" +

            name.toLowerCase();

            navigator.clipboard
            .writeText(shareURL);

            alert(
                "Copied Link:\n\n" +
                shareURL
            );

        });

        resultsContainer.appendChild(card);

    });

}

// SEARCH
input.addEventListener("input",()=>{

    const value =
    input.value
    .trim()
    .toLowerCase();

    if(!value){

        displayResults(profileData);

        return;

    }

    const filtered =
    profileData.filter(profile=>

        profile.fullInfo
        .toLowerCase()
        .includes(value)

    );

    displayResults(filtered);

});

// SHOW ALL
profileIcon.addEventListener("click",()=>{

    displayResults(profileData);

    engineStatus.innerText =
    "Showing All Profiles";

});

// OPEN PROFILE FROM URL HASH
function openProfileFromHash(){

    const hash =
    location.hash
    .replace("#","")
    .trim()
    .toLowerCase();

    if(!hash) return;

    const cards =
    document.querySelectorAll(
        ".result-card"
    );

    cards.forEach(card=>{

        const title =
        card.querySelector(
            ".res-title"
        )
        .innerText
        .toLowerCase();

        if(title.includes(hash)){

            card.scrollIntoView({

                behavior:"smooth",
                block:"center"

            });

            // OPEN DETAILS
            const details =
            card.querySelector(
                ".profile-details"
            );

            details.classList
            .add("show");

            // HIGHLIGHT
            card.style.border =
            "2px solid #004a7c";

        }

    });

}

// HASH CHANGE
window.addEventListener(
    "hashchange",
    openProfileFromHash
);

// START
fetchProfiles();

</script>

</body>
</html>
