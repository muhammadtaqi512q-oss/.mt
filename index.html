<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexura - Core Engine</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    background:#fff;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* NAV */

.top-nav{
    align-self:flex-end;
    padding:20px;
    display:flex;
    gap:15px;
    align-items:center;
}

.profile-icon{
    background:#004a7c;
    color:white;
    width:32px;
    height:32px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    cursor:pointer;
}

/* MAIN */

.main-container{
    flex-grow:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:100%;
    margin-top:-100px;
}

.logo{
    font-size:90px;
    font-weight:500;
    color:#004a7c;
    letter-spacing:-4px;
    margin-bottom:30px;
}

/* SEARCH */

.search-wrapper{
    width:100%;
    max-width:584px;
    position:relative;
}

.search-main{
    width:100%;
    height:46px;
    border:1px solid #dfe1e5;
    border-radius:24px;
    padding:0 50px;
    font-size:16px;
    outline:none;
}

.search-main:focus{
    box-shadow:0 1px 6px rgba(32,33,36,0.28);
}

.search-icon{
    position:absolute;
    left:18px;
    top:12px;
    color:#9aa0a6;
}

/* RESULTS */

#results-container{
    width:100%;
    max-width:584px;
    margin-top:25px;
    display:none;
}

.result-card{
    padding:15px 20px;
    border-bottom:1px solid #f1f3f4;
    position:relative;
    transition:0.2s;
}

.result-card:hover{
    background:#f8fbff;
}

.res-url{
    font-size:13px;
    color:#006621;
    display:block;
}

.res-title{
    font-size:19px;
    color:#1a0dab;
    text-decoration:none;
    cursor:pointer;
}

.res-title:hover{
    text-decoration:underline;
}

.rank-badge{
    position:absolute;
    right:10px;
    top:15px;
    font-size:10px;
    background:#f1f3f4;
    padding:2px 8px;
    border-radius:10px;
    color:#5f6368;
}

/* ENGINE */

.engine-status{
    font-size:12px;
    color:#888;
    margin-top:10px;
    font-style:italic;
}

/* SHARE BUTTON */

.share-btn{
    margin-top:10px;
    background:#004a7c;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;
    font-size:12px;
}

.share-btn:hover{
    background:#00345a;
}

</style>
</head>

<body>

<div class="top-nav">

    <div class="profile-icon">
        T
    </div>

</div>

<div class="main-container">

    <h1 class="logo">
        Nexura
    </h1>

    <div class="search-wrapper">

        <span class="search-icon">
            🔍
        </span>

        <input
            type="text"
            id="search-input"
            class="search-main"
            placeholder="Search Nexura Database..."
            disabled
        >

    </div>

    <div id="engine-status" class="engine-status">
        Connecting to Nexura Database Architecture...
    </div>

    <div id="results-container"></div>

</div>
