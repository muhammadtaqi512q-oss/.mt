<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexura - Core Engine</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    background:#ffffff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}

/* TOP NAV */

.top-nav{
    width:100%;
    display:flex;
    justify-content:flex-end;
    margin-bottom:20px;
}

.profile-icon{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#004a7c;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
}

/* MAIN */

.main-container{
    width:100%;
    max-width:700px;
}

.logo{
    text-align:center;
    font-size:90px;
    font-weight:700;
    color:#004a7c;
    margin-bottom:30px;
    letter-spacing:-4px;
}

/* SEARCH */

.search-wrapper{
    width:100%;
    position:relative;
}

.search-main{
    width:100%;
    height:55px;
    border-radius:50px;
    border:2px solid #004a7c;
    padding:0 60px;
    font-size:18px;
    outline:none;
}

.search-main:focus{
    box-shadow:0 0 10px #004a7c55;
}

.search-icon{
    position:absolute;
    left:20px;
    top:14px;
    font-size:22px;
    color:#004a7c;
}

/* STATUS */

.engine-status{
    margin-top:15px;
    text-align:center;
    color:#666;
    font-size:14px;
}

/* RESULTS */

#results-container{
    width:100%;
    margin-top:25px;
    display:none;
}

/* CARD */

.result-card{
    background:#f7fbff;
    border:1px solid #dbe8ff;
    border-radius:20px;
    padding:20px;
    margin-bottom:18px;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.result-card:hover{
    transform:translateY(-2px);
    background:#edf6ff;
}

.res-url{
    font-size:13px;
    color:#008000;
    margin-bottom:6px;
    display:block;
}

.res-title{
    font-size:24px;
    font-weight:700;
    color:#004a7c;
    cursor:pointer;
    margin-bottom:10px;
}

.res-title:hover{
    text-decoration:underline;
}

.rank-badge{
    display:inline-block;
    margin-top:8px;
    background:#e6eefc;
    color:#004a7c;
    padding:4px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
}

/* SHARE */

.share-btn{
    width:100%;
    margin-top:15px;
    height:45px;
    border:none;
    border-radius:40px;
    background:#004a7c;
    color:white;
    font-size:15px;
    cursor:pointer;
}

.share-btn:hover{
    background:#00345a;
}

</style>
</head>

<body>

<div class="top-nav">

    <div class="profile-icon">
        T
    </div>

</div>

<div class="main-container">

    <div class="logo">
        Nexura
    </div>

    <div class="search-wrapper">

        <div class="search-icon">
            🔍
        </div>

        <input
            type="text"
            id="search-input"
            class="search-main"
            placeholder="Search Nexura Database..."
            disabled
        >

    </div>

    <div id="engine-status" class="engine-status">
        Connecting to Nexura Database Architecture...
    </div>

    <div id="results-container"></div>

</div>

<script>

// LINKS
const domainRulesLink =
"https://muhammadtaqi512q-oss.github.io/.mt/domains";

const websitesDataLink =
"https://muhammadtaqi512q-oss.github.io/.mt/data";

// STORAGE
let websiteDB = [];

let rankingRules = {

    p1:[],
    p2:[],
    p3:[]

};

// ELEMENTS
const input =
document.getElementById("search-input");

const container =
document.getElementById("results-container");

const statusDiv =
document.getElementById("engine-status");

const profileIcon =
document.querySelector(".profile-icon");

// INIT ENGINE
async function initEngine(){

    try{

        // FETCH DOMAIN RULES
        const ruleRes =
        await fetch(domainRulesLink);

        const ruleHtml =
        await ruleRes.text();

        const ruleDoc =
        new DOMParser()
        .parseFromString(ruleHtml,"text/html");

        const ruleText =
        ruleDoc
        .getElementById("target-link")
        .innerText
        .toLowerCase();

        rankingRules.p1 =
        ruleText.match(
            /p1:\s*includes\s*(.*?)(?=\s*p2|$)/
        )?.[1]
        ?.split(",")
        .map(s=>s.trim().replace(".",""))
        || [];

        rankingRules.p2 =
        ruleText.match(
            /p2:\s*includes\s*(.*?)(?=\s*p3|$)/
        )?.[1]
        ?.split(",")
        .map(s=>s.trim().replace(".",""))
        || [];

        rankingRules.p3 =
        ruleText.match(
            /p3:\s*includes\s*(.*?)(?=\.|$)/
        )?.[1]
        ?.split(",")
        .map(s=>s.trim().replace(".",""))
        || [];

        // FETCH WEBSITE DATA
        const webRes =
        await fetch(websitesDataLink);

        const webHtml =
        await webRes.text();

        const webDoc =
        new DOMParser()
        .parseFromString(webHtml,"text/html");

        const webParas =
        webDoc.querySelectorAll("p");

        webParas.forEach(p=>{

            const txt =
            p.innerText;

            const n =
            txt.match(
                /NAME\s+(.*?)\s+LINK/
            )?.[1]?.trim();

            const l =
            txt.match(
                /LINK\s+(.*?)\s+SOURCE/
            )?.[1]?.trim();

            const s =
            txt.match(
                /SOURCE\s+(.*)/
            )?.[1]?.trim();

            if(n && l && s){

                websiteDB.push({

                    name:n,
                    display:l,
                    source:s

                });

            }

        });

        // SUCCESS
        statusDiv.innerText =
        "Nexura Core Engine Linked";

        setTimeout(()=>{

            statusDiv.style.display =
            "none";

        },2000);

        input.disabled = false;

        input.focus();

        // HASH CHECK
        openFromHash();

        // NO HASH = SHOW ALL
        if(!location.hash){

            render(websiteDB);

        }

    }

    catch(e){

        console.log(e);

        statusDiv.innerText =
        "Engine Link Failed";

        statusDiv.style.color =
        "red";

    }

}

// PRIORITY SYSTEM
function getPriorityScore(url){

    const link =
    url.toLowerCase();

    const parts =
    link.split(".");

    const ext =
    parts[parts.length - 1];

    const isSub =

    (
        parts[0] !== "www"
        &&
        parts[0] !== "mmm"
        &&
        parts.length > 2
    );

    if(
        rankingRules.p1.includes(ext)
    ){
        return isSub ? 1.5 : 1;
    }

    if(
        rankingRules.p2.includes(ext)
    ){
        return isSub ? 2.5 : 2;
    }

    if(
        rankingRules.p3.includes(ext)
    ){
        return isSub ? 3.5 : 3;
    }

    return 10;

}

// SEARCH
input.addEventListener("input",()=>{

    const query =
    input.value
    .toLowerCase()
    .trim();

    // EMPTY
    if(!query){

        if(location.hash){

            openFromHash();

        }

        else{

            render(websiteDB);

        }

        return;

    }

    // FILTER
    const filtered =
    websiteDB.filter(item=>

        item.name
        .toLowerCase()
        .includes(query)

        ||

        item.display
        .toLowerCase()
        .includes(query)

    );

    // SORT
    filtered.sort(
        (a,b)=>

        getPriorityScore(a.display)

        -

        getPriorityScore(b.display)
    );

    render(filtered);

});

// RENDER
function render(data){

    container.innerHTML = "";

    // NO RESULTS
    if(data.length === 0){

        container.style.display =
        "none";

        return;

    }

    container.style.display =
    "block";

    data.forEach(item=>{

        const score =
        getPriorityScore(item.display);

        const card =
        document.createElement("div");

        card.className =
        "result-card";

        card.innerHTML = `

            <span class="res-url">
                ${item.display}
            </span>

            <div class="res-title">
                ${item.name}
            </div>

            <div class="rank-badge">
                P${Math.floor(score)}
            </div>

            <button class="share-btn">
                Share
            </button>

        `;

        // CLICK PROFILE
        card.querySelector(
            ".res-title"
        ).addEventListener("click",()=>{

            // ONLY THIS PROFILE
            location.hash =
            item.name.toLowerCase();

        });

        // SHARE BUTTON
        card.querySelector(
            ".share-btn"
        ).addEventListener("click",()=>{

            const shareURL =

            window.location.origin +

            window.location.pathname +

            "#" +

            item.name.toLowerCase();

            navigator.clipboard
            .writeText(shareURL);

            alert(
                "Copied Link:\n\n" +
                shareURL
            );

        });

        container.appendChild(card);

    });

}

// HASH FUNCTION
function openFromHash(){

    const hash =
    location.hash
    .replace("#","")
    .trim()
    .toLowerCase();

    // NO HASH
    if(!hash){

        render(websiteDB);

        return;

    }

    // ONLY MATCH PROFILE
    const filtered =
    websiteDB.filter(item=>

        item.name
        .toLowerCase()
        === hash

    );

    // SHOW ONLY MATCH
    render(filtered);

    // SCROLL
    setTimeout(()=>{

        const card =
        document.querySelector(
            ".result-card"
        );

        if(card){

            card.scrollIntoView({

                behavior:"smooth",
                block:"center"

            });

            card.style.border =
            "2px solid #004a7c";

        }

    },100);

}

// SHOW ALL
profileIcon.addEventListener("click",()=>{

    location.hash = "";

    input.value = "";

    render(websiteDB);

});

// HASH CHANGE
window.addEventListener(
    "hashchange",
    openFromHash
);

// START
initEngine();

</script>

</body>
</html>
